<!-- chip-detector/web/index.html - 设备识别主页面（含云端芯片详情） -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip Detector - 设备识别</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .app { display: flex; height: 100vh; }

        .sidebar {
            width: 240px;
            background: #0a0f1a;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1e293b;
        }
        .sidebar .logo { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 32px; }
        .sidebar .logo span { font-size: 12px; color: var(--muted); display: block; font-weight: 400; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 6px; color: var(--muted);
            cursor: pointer; transition: all 0.2s; margin-bottom: 4px;
            text-decoration: none;
        }
        .nav-item:hover { background: #1e293b; color: var(--text); }
        .nav-item.active { background: #1e293b; color: var(--accent); }
        .nav-item .badge {
            margin-left: auto; background: var(--accent); color: #000;
            font-size: 11px; padding: 2px 6px; border-radius: 10px; font-weight: 600;
        }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header {
            padding: 16px 24px; border-bottom: 1px solid #1e293b;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header .actions { display: flex; gap: 8px; }

        .btn {
            padding: 8px 16px; border: none; border-radius: 6px;
            font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #334155; color: var(--text); }
        .btn-secondary:hover { background: #475569; }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid #334155; }
        .btn-ghost:hover { background: #1e293b; color: var(--text); }

        .content { flex: 1; padding: 24px; overflow-y: auto; }

        .status-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; background: var(--card); border-radius: 8px; margin-bottom: 20px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
        .status-dot.online { background: var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card {
            background: var(--card); border-radius: 8px; padding: 16px;
            border-left: 3px solid var(--accent);
        }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .label { font-size: 12px; color: var(--muted); margin-top: 4px; }

        .device-list { display: flex; flex-direction: column; gap: 12px; }
        .device-card {
            background: var(--card); border-radius: 8px; padding: 16px;
            border-left: 3px solid var(--accent);
            display: flex; align-items: center; gap: 16px;
            transition: transform 0.2s;
        }
        .device-card:hover { transform: translateX(4px); }
        .device-card .icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .device-card .icon.debugger { background: #1e3a5f; }
        .device-card .icon.serial { background: #1e4a3a; }
        .device-card .icon.bootloader { background: #4a3a1e; }
        .device-card .info { flex: 1; min-width: 0; }
        .device-card .name { font-weight: 600; font-size: 15px; }
        .device-card .vid-pid { font-size: 12px; color: var(--muted); font-family: monospace; margin-top: 2px; }
        .device-card .chip {
            font-size: 14px; font-weight: 600; margin-top: 4px;
            display: flex; align-items: center; gap: 6px; cursor: pointer;
        }
        .device-card .chip.detected { color: var(--green); }
        .device-card .chip.detected:hover { text-decoration: underline; }
        .device-card .chip.unknown { color: var(--yellow); cursor: default; }
        .device-card .actions-right { display: flex; gap: 8px; flex-shrink: 0; }

        .tag {
            font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500;
            display: inline-block;
        }
        .tag-cache { background: #1e3a5f; color: var(--accent); }
        .tag-probe { background: #4a3a1e; color: var(--yellow); }
        .tag-confident { background: #1e4a3a; color: var(--green); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
        .empty-state .icon-big { font-size: 56px; margin-bottom: 16px; }

        .toast {
            position: fixed; top: 20px; right: 20px;
            padding: 12px 20px; border-radius: 8px; color: #fff;
            font-size: 14px; z-index: 1000; animation: slideIn 0.3s;
            max-width: 400px;
        }
        .toast.success { background: #166534; }
        .toast.error { background: #7f1d1d; }
        .toast.info { background: #1e3a5f; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 芯片详情弹窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75); display: flex;
            align-items: center; justify-content: center; z-index: 2000;
        }
        .modal {
            background: var(--card); border-radius: 12px;
            width: 90%; max-width: 720px; max-height: 85vh; overflow-y: auto;
            border: 1px solid #334155;
        }
        .modal-header {
            padding: 20px 24px; border-bottom: 1px solid #1e293b;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 18px; font-weight: 600; position: sticky; top: 0;
            background: var(--card); border-radius: 12px 12px 0 0;
        }
        .modal-close {
            background: none; border: none; color: var(--muted);
            font-size: 22px; cursor: pointer; padding: 4px 8px;
        }
        .modal-close:hover { color: var(--text); }
        .modal-body { padding: 24px; }
        .modal-loading { text-align: center; color: var(--muted); padding: 48px 0; }
        .modal-loading .spinner {
            width: 32px; height: 32px; border: 3px solid #334155;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .chip-grid .item {
            background: #0a0f1a; padding: 14px; border-radius: 8px;
        }
        .chip-grid .item .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .chip-grid .item .value { font-size: 15px; font-weight: 600; margin-top: 6px; }
        .chip-links { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .chip-link {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 18px; background: var(--accent); color: #000;
            border-radius: 8px; text-decoration: none;
            font-size: 13px; font-weight: 600; transition: all 0.2s;
        }
        .chip-link:hover { background: #7dd3fc; transform: translateY(-1px); }
        .chip-link.secondary { background: #334155; color: var(--text); }
        .chip-link.secondary:hover { background: #475569; }
        .code-block {
            background: #0a0f1a; padding: 16px; border-radius: 8px;
            font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
            line-height: 1.6; overflow-x: auto; white-space: pre;
            color: #22c55e; margin-top: 8px;
        }
        .code-block .comment { color: #64748b; }
        .code-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .code-header span { font-size: 12px; color: var(--muted); }
        .code-header button {
            background: #334155; border: none; color: var(--text);
            padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
        }

        /* 下载引导横幅 */
        .download-banner {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            border: 1px solid rgba(56,189,248,0.3);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .download-banner .banner-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .download-banner .banner-icon {
            font-size: 28px;
            flex-shrink: 0;
        }
        .download-banner .banner-text h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .download-banner .banner-text p {
            font-size: 12px;
            color: var(--muted);
        }
        .download-banner .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .download-banner .btn-download:hover {
            background: #7dd3fc;
            transform: translateY(-1px);
        }
        .download-banner .btn-close-banner {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            flex-shrink: 0;
        }
        .download-banner .btn-close-banner:hover {
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">🔍 ChipDetector<span>芯片识别系统 v0.2</span></div>
            <nav>
                <a href="/" class="nav-item active">📋 设备识别<span class="badge" id="deviceCount">0</span></a>
                <a href="/history.html" class="nav-item">📜 识别历史</a>
                <a href="/settings.html" class="nav-item">⚙️ 系统设置</a>
                <a href="/download.html" class="nav-item" style="color:var(--accent);">📥 下载应用</a>
            </nav>
            <div style="margin-top: auto; font-size: 11px; color: #475569;">
                服务端口: 8080<br>
                缓存路径: ~/.cache/chip-detector
            </div>
        </aside>

        <main class="main">
            <header class="header">
                <h1>📋 设备识别</h1>
                <div class="actions">
                    <button class="btn btn-ghost" onclick="clearLogs()">清空日志</button>
                    <button class="btn btn-secondary" onclick="scanUSB()">📡 扫描USB</button>
                    <button class="btn btn-primary" id="btnDetect" onclick="quickDetect()">🔍 快速识别</button>
                </div>
            </header>

            <div class="content">
                <!-- 下载引导横幅 -->
                <div class="download-banner" id="downloadBanner">
                    <div class="banner-left">
                        <div class="banner-icon">💻</div>
                        <div class="banner-text">
                            <h3>下载桌面应用获得完整体验</h3>
                            <p>插上开发板即可自动识别芯片型号，无需手动配置</p>
                        </div>
                    </div>
                    <a href="/download.html" class="btn-download">
                        ⬇ 立即下载
                    </a>
                    <button class="btn-close-banner" onclick="document.getElementById('downloadBanner').style.display='none'" title="关闭">✕</button>
                </div>

                <!-- 连接状态 -->
                <div class="status-bar">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">正在连接服务...</span>
                    <span style="margin-left: auto; font-size: 12px; color: var(--muted);" id="uptime"></span>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <div class="value" id="statTotal">0</div>
                        <div class="label">已发现设备</div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--green);">
                        <div class="value" id="statIdentified">0</div>
                        <div class="label">已识别芯片</div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--yellow);">
                        <div class="value" id="statPending">0</div>
                        <div class="label">待探测</div>
                    </div>
                    <div class="stat-card" style="border-left-color: #6366f1;">
                        <div class="value" id="statCache">0</div>
                        <div class="label">缓存命中</div>
                    </div>
                </div>

                <div class="device-list" id="deviceList">
                    <div class="empty-state">
                        <div class="icon-big">🔌</div>
                        <p style="font-size: 16px; margin-bottom: 8px;">未发现设备</p>
                        <p>请连接开发板，然后点击「快速识别」或「扫描USB」</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 芯片详情弹窗 -->
    <div class="modal-overlay" id="modal" style="display:none;" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <div class="modal-header">
                <span id="modalTitle">🎯 芯片详情</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="modal-loading">
                    <div class="spinner"></div>
                    <p>正在从云端获取芯片资料...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080';
        const WS_URL = 'ws://localhost:8080/ws';
        const CLOUD_API = 'https://api.chip-detector.com/v1/chip-info';
        let ws = null;
        let wsConnected = false;

        function connectWS() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                wsConnected = true;
                updateStatus(true);
                ws.send(JSON.stringify({ type: 'ping' }));
            };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'scan_result') renderDevices(msg.payload.devices);
                if (msg.type === 'pong') updateStatus(true);
            };
            ws.onclose = () => {
                wsConnected = false;
                updateStatus(false);
                setTimeout(connectWS, 3000);
            };
            ws.onerror = () => { wsConnected = false; updateStatus(false); };
        }

        function updateStatus(online) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            dot.className = 'status-dot' + (online ? ' online' : '');
            text.textContent = online ? '服务已连接' : '服务断开，自动重连中...';
            document.getElementById('btnDetect').disabled = !online;
        }

        async function scanUSB() {
            try {
                const res = await fetch(`${API}/api/scan`);
                const data = await res.json();
                if (data.success) {
                    renderDevices(data.data.usb_devices || data.data.devices || []);
                } else {
                    toast(data.error, 'error');
                }
            } catch (err) {
                toast('连接失败，请确认本地服务已启动', 'error');
            }
        }

        async function quickDetect() {
            const btn = document.getElementById('btnDetect');
            btn.disabled = true;
            btn.textContent = '⏳ 识别中...';
            try {
                const res = await fetch(`${API}/api/quick-detect`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    renderDevices(data.data.devices);
                    toast(`识别完成，耗时 ${data.data.scan_duration?.toFixed(2)}s`, 'success');
                } else {
                    toast(data.error, 'error');
                }
            } catch (err) {
                toast('识别失败，请确认本地服务已启动', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 快速识别';
            }
        }

        function renderDevices(devices) {
            const container = document.getElementById('deviceList');
            if (!devices || devices.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon-big">🤷</div><p style="font-size:16px;">未发现设备</p></div>`;
                updateStats(0, 0, 0, 0);
                return;
            }

            let identified = 0, pending = 0, cacheHit = 0;
            container.innerHTML = devices.map(dev => {
                const vidHex = '0x' + (dev.vid || 0).toString(16).padStart(4, '0').toUpperCase();
                const pidHex = '0x' + (dev.pid || 0).toString(16).padStart(4, '0').toUpperCase();
                const hasChip = !!dev.chip;
                const fromCache = dev.from_cache;
                if (hasChip) identified++;
                if (dev.needs_probe) pending++;
                if (fromCache) cacheHit++;

                let iconClass = 'unknown';
                if (dev.device_class === 'debugger') iconClass = 'debugger';
                else if (dev.device_class === 'serial') iconClass = 'serial';
                else if (dev.device_class === 'bootloader') iconClass = 'bootloader';
                const iconEmoji = { debugger: '🔧', serial: '🔌', bootloader: '💾', unknown: '❓' }[dev.device_class] || '❓';

                return `
                <div class="device-card">
                    <div class="icon ${iconClass}">${iconEmoji}</div>
                    <div class="info">
                        <div class="name">${dev.device_class || 'Unknown Device'}</div>
                        <div class="vid-pid">VID: ${vidHex} &nbsp; PID: ${pidHex} &nbsp;|&nbsp; 序列号: ${dev.serial || '无'}</div>
                        <div class="chip ${hasChip ? 'detected' : 'unknown'}" ${hasChip ? `onclick="showChipDetail('${dev.chip}')" title="点击查看芯片详情"` : ''}>
                            ${hasChip ? '🎯 ' + dev.chip + ' <span style="font-size:11px;color:var(--accent);">详情 →</span>' : '⚠️ 未识别'}
                            ${fromCache ? '<span class="tag tag-cache">缓存</span>' : ''}
                            ${dev.needs_probe ? '<span class="tag tag-probe">需探测</span>' : ''}
                            ${dev.confidence > 0.9 ? '<span class="tag tag-confident">高置信度</span>' : ''}
                        </div>
                    </div>
                    <div class="actions-right">
                        ${dev.needs_probe ? `<button class="btn btn-secondary" onclick="event.stopPropagation();probeDevice('${vidHex}','${pidHex}','${dev.serial || ''}')">🔬 探测</button>` : ''}
                    </div>
                </div>`;
            }).join('');

            updateStats(devices.length, identified, pending, cacheHit);
            document.getElementById('deviceCount').textContent = devices.length;
        }

        function updateStats(total, identified, pending, cache) {
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statIdentified').textContent = identified;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statCache').textContent = cache;
        }

        async function probeDevice(vid, pid, serial) {
            toast('正在探测...', 'info');
            try {
                const res = await fetch(`${API}/api/detect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vid: parseInt(vid), pid: parseInt(pid), serial })
                });
                const data = await res.json();
                if (data.success) {
                    toast(`探测成功: ${data.data.chip}`, 'success');
                    quickDetect();
                } else {
                    toast(data.error, 'error');
                }
            } catch (err) {
                toast('探测失败', 'error');
            }
        }

        function clearLogs() { toast('日志已清空', 'info'); }

        async function showChipDetail(chip) {
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');

            modal.style.display = 'flex';
            modalTitle.textContent = '🎯 ' + chip;
            modalBody.innerHTML = `
                <div class="modal-loading">
                    <div class="spinner"></div>
                    <p>正在从云端获取 ${chip} 的详细资料...</p>
                </div>`;

            try {
                const res = await fetch(`${CLOUD_API}?chip=${encodeURIComponent(chip)}`);
                if (!res.ok) throw new Error('云端请求失败');
                const data = await res.json();
                renderChipDetail(data);
            } catch (err) {
                renderChipDetail(getLocalChipData(chip));
            }
        }

        function renderChipDetail(data) {
            const modalBody = document.getElementById('modalBody');
            const linksHtml = (data.datasheet || data.sdk || data.pinout || data.reference) ? `
                <div class="chip-links">
                    ${data.datasheet ? `<a class="chip-link" href="${data.datasheet}" target="_blank">📄 数据手册</a>` : ''}
                    ${data.sdk ? `<a class="chip-link secondary" href="${data.sdk}" target="_blank">💻 SDK 下载</a>` : ''}
                    ${data.pinout ? `<a class="chip-link secondary" href="${data.pinout}" target="_blank">📌 引脚图</a>` : ''}
                    ${data.reference ? `<a class="chip-link secondary" href="${data.reference}" target="_blank">📚 参考设计</a>` : ''}
                </div>` : '';

            const codeHtml = data.code ? `
                <div class="code-header">
                    <span>📝 初始化代码示例</span>
                    <button onclick="copyCode(this)">📋 复制</button>
                </div>
                <div class="code-block">${escapeHtml(data.code)}</div>` : '';

            modalBody.innerHTML = `
                <div class="chip-grid">
                    <div class="item"><div class="label">芯片型号</div><div class="value">${data.model || '-'}</div></div>
                    <div class="item"><div class="label">内核架构</div><div class="value">${data.core || '-'}</div></div>
                    <div class="item"><div class="label">Flash 存储</div><div class="value">${data.flash || '-'}</div></div>
                    <div class="item"><div class="label">RAM 内存</div><div class="value">${data.ram || '-'}</div></div>
                    <div class="item"><div class="label">主频</div><div class="value">${data.freq || '-'}</div></div>
                    <div class="item"><div class="label">工作电压</div><div class="value">${data.voltage || '-'}</div></div>
                    <div class="item"><div class="label">GPIO 数量</div><div class="value">${data.gpio || '-'}</div></div>
                    <div class="item"><div class="label">通信接口</div><div class="value">${data.interfaces || '-'}</div></div>
                </div>
                ${linksHtml}
                ${codeHtml}
                ${data.vendor_url ? `<p style="margin-top:16px;font-size:12px;color:var(--muted);">🏢 厂商: <a href="${data.vendor_url}" target="_blank" style="color:var(--accent);">${data.vendor || '访问官网'}</a></p>` : ''}
            `;
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function copyCode(btn) {
            const codeBlock = btn.closest('.modal-body').querySelector('.code-block');
            if (codeBlock) {
                navigator.clipboard.writeText(codeBlock.textContent).then(() => {
                    btn.textContent = '✅ 已复制';
                    setTimeout(() => btn.textContent = '📋 复制', 1500);
                });
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getLocalChipData(chip) {
            const db = {
                'STM32F407VGT6': {
                    model:'STM32F407VGT6',core:'ARM Cortex-M4',flash:'1MB',ram:'192KB',
                    freq:'168MHz',voltage:'1.8V-3.6V',gpio:'82',interfaces:'SPI×3, I2C×3, USART×4, USB OTG, CAN×2',
                    datasheet:'https://www.st.com/resource/en/datasheet/stm32f407vg.pdf',
                    sdk:'https://github.com/STMicroelectronics/STM32CubeF4',
                    pinout:'https://www.st.com/resource/en/pinout/stm32f407vg.pdf',
                    code:`// STM32F407 初始化代码\n#include "stm32f4xx.h"\n\nvoid SystemClock_Config(void) {\n  RCC_ClkInitTypeDef clk = {0};\n  HAL_RCC_ClockConfig(&clk, FLASH_LATENCY_5);\n}\n\nint main(void) {\n  HAL_Init();\n  SystemClock_Config();\n  while(1) {}\n}`,
                    vendor:'STMicroelectronics',vendor_url:'https://www.st.com'
                },
                'ESP32-C3': {
                    model:'ESP32-C3',core:'RISC-V 32位',flash:'4MB',ram:'400KB SRAM',
                    freq:'160MHz',voltage:'3.0V-3.6V',gpio:'22',interfaces:'SPI×3, I2C×1, UART×2, USB Serial/JTAG',
                    datasheet:'https://www.espressif.com/sites/default/files/documentation/esp32-c3_datasheet_en.pdf',
                    sdk:'https://github.com/espressif/esp-idf',
                    pinout:'https://docs.espressif.com/projects/esp-idf/en/latest/esp32c3/hw-reference/esp32c3/user-guide-devkitm-1.html',
                    code:`// ESP32-C3 初始化\n#include "freertos/FreeRTOS.h"\n#include "freertos/task.h"\n\nvoid app_main(void) {\n  printf("Hello ESP32-C3!\\n");\n  while(1) {\n    vTaskDelay(1000 / portTICK_PERIOD_MS);\n  }\n}`,
                    vendor:'Espressif',vendor_url:'https://www.espressif.com'
                },
                'RP2040': {
                    model:'RP2040',core:'Dual Cortex-M0+',flash:'2MB (外部)',ram:'264KB SRAM',
                    freq:'133MHz',voltage:'1.8V-3.3V',gpio:'30',interfaces:'SPI×2, I2C×2, UART×2, USB, PIO×2',
                    datasheet:'https://datasheets.raspberrypi.com/rp2040/rp2040-datasheet.pdf',
                    sdk:'https://github.com/raspberrypi/pico-sdk',
                    pinout:'https://datasheets.raspberrypi.com/pico/pico-datasheet.pdf',
                    code:`// RP2040 初始化\n#include "pico/stdlib.h"\n\nint main() {\n  stdio_init_all();\n  printf("Hello RP2040!\\n");\n  while(1) {\n    sleep_ms(1000);\n  }\n}`,
                    vendor:'Raspberry Pi',vendor_url:'https://www.raspberrypi.com'
                }
            };

            for (const key of Object.keys(db)) {
                if (chip.includes(key) || key.includes(chip)) return db[key];
            }
            return {
                model: chip, core: '请连接云端获取完整参数',
                flash: '-', ram: '-', freq: '-', voltage: '-', gpio: '-', interfaces: '-',
                datasheet: '', sdk: '', pinout: '', code: '',
                vendor: '', vendor_url: ''
            };
        }

        function toast(msg, type = 'info') {
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        connectWS();
        setTimeout(scanUSB, 500);
    </script>
</body>
</html>
