<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip Detector - 下载</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { text-align: center; max-width: 600px; padding: 40px 24px; }
        .logo { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: var(--muted); font-size: 16px; margin-bottom: 40px; }
        .download-card { background: var(--card); border-radius: 12px; padding: 32px; border: 1px solid #334155; margin-bottom: 16px; }
        .download-card.recommended { border-color: var(--accent); }
        .badge { display: inline-block; background: var(--accent); color: #000; font-size: 12px; padding: 4px 10px; border-radius: 12px; font-weight: 600; margin-bottom: 12px; }
        .os-icon { font-size: 40px; margin-bottom: 8px; }
        .os-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .os-hint { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
        .btn { display: inline-block; padding: 12px 32px; border-radius: 8px; font-size: 15px; font-weight: 600; text-decoration: none; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #7dd3fc; }
        .footer { margin-top: 40px; font-size: 12px; color: #475569; }
        .footer a { color: var(--accent); text-decoration: none; }
        .back-link { margin-top: 16px; font-size: 13px; }
        .back-link a { color: var(--muted); text-decoration: none; }
        .back-link a:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔍</div>
        <h1>Chip Detector</h1>
        <p class="subtitle">插上开发板，自动识别芯片型号</p>
        <div class="download-card recommended" id="card-mac">
            <div class="badge" id="badge-mac">推荐</div>
            <div class="os-icon">🍎</div>
            <div class="os-name">macOS</div>
            <div class="os-hint">支持 macOS 12+ · 10MB</div>
            <a class="btn btn-primary" href="/dist/ChipDetector-0.2.0.dmg">⬇ 下载 macOS 版</a>
        </div>
        <div class="download-card" id="card-win">
            <div class="os-icon">🪟</div>
            <div class="os-name">Windows</div>
            <div class="os-hint">支持 Windows 10/11 · 8.9MB</div>
            <a class="btn btn-primary" href="/dist/ChipDetector.exe">⬇ 下载 Windows 版</a>
        </div>
        <div class="back-link">
            <a href="/">← 返回识别工具</a>
        </div>
        <div class="footer">版本 v0.2.0 · <a href="https://github.com/jacobhonz-glitch/chip-detector">GitHub</a></div>
    </div>
    <script>
        const ua = navigator.userAgent;
        if (ua.indexOf('Win') !== -1) {
            document.getElementById('card-win').classList.add('recommended');
            document.getElementById('card-mac').classList.remove('recommended');
            document.getElementById('badge-mac').style.display = 'none';
        }
    </script>
</body>
</html>
