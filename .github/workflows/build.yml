name: Build
on:
  push:
    tags:
      - 'v*'

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller --onefile --windowed --add-data "web:web" --name ChipDetector server.py
      - uses: actions/upload-artifact@v4
        with:
          name: ChipDetector-macOS
          path: dist/ChipDetector

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller --onefile --windowed --add-data "web;web" --name ChipDetector.exe server.py
      - uses: actions/upload-artifact@v4
        with:
          name: ChipDetector-Windows
          path: dist/ChipDetector.exe
